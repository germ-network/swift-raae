name: CI

on:
  push:
    # branches:
    #   - main
    paths-ignore:
      - 'README.md'
      - 'CODE_OF_CONDUCT.md'
      - '.editorconfig'
      - '.spi.yml'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test MacOS
    runs-on: macOS-26
    timeout-minutes: 30
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.2.app
    strategy:
      matrix:
        destination:
          - "platform=macOS"
          - "platform=macOS,variant=Mac Catalyst"
          - "platform=iOS Simulator,name=iPhone 17e"
          - "platform=iOS Simulator,name=iPhone Air"
          # - "platform=tvOS Simulator,name=Apple TV"
          # - "platform=watchOS Simulator,name=Apple Watch Series 10 (42mm)"
          # - "platform=visionOS Simulator,name=Apple Vision Pro"
    steps:
      - uses: actions/checkout@v5
      - name: Test platform ${{ matrix.destination }}
        run: set -o pipefail && xcodebuild -skipMacroValidation -scheme {Scheme} -destination "${{ matrix.destination }}" test | xcbeautify
